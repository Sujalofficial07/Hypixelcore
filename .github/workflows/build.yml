name: Build SkyblockCore

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    # Step 1 jar needs to be in libs/ folder in your repo to compile successfully.
    - name: Build with Maven
      run: mvn clean package
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SkyblockCore-JAR
        path: target/SkyblockCore-*.jar
        
